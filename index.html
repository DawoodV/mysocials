<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>digi_xd/dawood / 23</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root {
            --neon-blue: #00ccff;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: #000 url('fish.gif') center/cover no-repeat fixed;
            color: var(--neon-blue);
            font-family: 'VT323', monospace;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }
        /* ── swimming fish layer ── */
        #fish-layer {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }
        .swimming-fish {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .swimming-fish img {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
        }
        @media (max-width: 480px) {
            .swimming-fish img {
                width: 80px;
            }
        }
        .fish-label {
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 15px;
            letter-spacing: 1px;
            text-shadow:
                1px 1px 0 #000,
                -1px 1px 0 #000,
                1px -1px 0 #000,
                -1px -1px 0 #000,
                0 2px 6px rgba(0,0,0,0.9);
            white-space: nowrap;
            pointer-events: none;
        }
        @media (max-width: 480px) {
            .fish-label { font-size: 12px; }
        }
        /* ── tap-to-enter overlay ── */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'VT323', monospace;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            gap: 12px;
            padding: 20px;
            text-align: center;
        }
        #start-overlay .enter-text {
            font-size: clamp(24px, 8vw, 36px);
            letter-spacing: 4px;
            animation: blink 1s infinite;
        }
        #start-overlay .sub-text {
            font-size: clamp(14px, 4vw, 18px);
            opacity: 0.6;
            letter-spacing: 2px;
        }
        #start-overlay.hidden {
            display: none;
        }
        /* ── mute button ── */
        #mute-btn {
            position: fixed;
            bottom: calc(14px + env(safe-area-inset-bottom));
            right: 14px;
            z-index: 100;
            background: #1c1c1c;
            border: 3px outset #555;
            color: var(--neon-blue);
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 6px 12px;
            cursor: pointer;
            letter-spacing: 1px;
            text-shadow: 0 0 6px var(--neon-blue);
            display: none;
            touch-action: manipulation;
        }
        #mute-btn:active {
            border-style: inset;
        }
        /* ── winamp wrapper ── */
        .winamp {
            width: 340px;
            max-width: 92vw;
            margin: 15px auto;
            background: #1c1c1c;
            border: 6px solid #444;
            border-top-color: #666;
            border-left-color: #666;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
            z-index: 10;
            zoom: 0.65;
        }
        .winamp::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0, 204, 255, 0.07) 3px,
                rgba(0, 204, 255, 0.07) 6px
            );
            pointer-events: none;
            z-index: 999;
            animation: flicker 0.12s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.93; }
            100% { opacity: 1; }
        }
        .title-bar {
            background: linear-gradient(to right, #222, #444);
            height: 24px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            border-bottom: 3px solid #111;
            font-size: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 6px var(--neon-blue);
        }
        .title-bar span {
            flex: 1;
            text-align: center;
        }
        .title-buttons {
            display: flex;
            gap: 3px;
        }
        .title-btn {
            width: 18px;
            height: 16px;
            background: #222;
            border: 2px solid #666;
            border-top-color: #999;
            border-left-color: #999;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .title-btn:active {
            border-style: inset;
        }
        .main-window {
            padding: 10px 12px 8px;
            background: #111;
        }
        .now-playing-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            background: #000;
            border: 3px inset #333;
            padding: 6px;
        }
        .visualizer {
            flex: 1;
            display: flex;
            align-items: flex-end;
            height: 64px;
            gap: 2px;
            padding: 4px;
            background: #001122;
            border: 3px solid #222;
            box-shadow: inset 0 0 10px var(--neon-blue);
            overflow: hidden;
        }
        .bar {
            flex: 1;
            min-width: 4px;
            background: linear-gradient(#00ccff, #0099cc);
            box-shadow: 0 0 8px var(--neon-blue);
            transition: height 0.04s linear;
        }
        .time-display {
            min-width: 80px;
            background: #001122;
            border: 3px inset #222;
            padding: 4px 6px;
            font-size: clamp(22px, 7vw, 32px);
            line-height: 1;
            text-align: center;
            letter-spacing: 3px;
            text-shadow: 0 0 12px var(--neon-blue);
            white-space: nowrap;
        }
        .track-info {
            background: #001122;
            border: 3px inset #222;
            padding: 10px 12px;
            margin-bottom: 10px;
            text-align: center;
        }
        .artist {
            font-size: clamp(18px, 6vw, 24px);
            letter-spacing: 2px;
        }
        .track-title {
            font-size: clamp(15px, 5vw, 19px);
            color: #00eeff;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        .ctrl-btn {
            flex: 1;
            max-width: 52px;
            height: 44px;
            background: linear-gradient(#2a2a2a, #111);
            border: 3px outset #555;
            color: var(--neon-blue);
            font-size: clamp(18px, 6vw, 24px);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active {
            border-style: inset;
            transform: translateY(2px);
        }
        .progress-container {
            height: 12px;
            background: #001122;
            border: 3px inset #222;
            position: relative;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #00ccff, #0099cc);
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .footer-info {
            display: flex;
            font-size: 13px;
            justify-content: space-between;
            color: #00aaff;
        }
        .playlist {
            border-top: 5px solid #222;
            background: #111;
        }
        .playlist-header {
            background: linear-gradient(to right, #222, #444);
            padding: 5px 10px;
            font-size: 16px;
            letter-spacing: 1px;
        }
        .playlist-header::before {
            content: '▶';
            margin-right: 6px;
            animation: blink 0.8s infinite;
        }
        .playlist-list {
            max-height: 190px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .playlist-list::-webkit-scrollbar {
            display: none;
        }
        .playlist-row {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            font-size: clamp(14px, 4.5vw, 16px);
            cursor: pointer;
            border-bottom: 1px dotted #222;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .playlist-row:hover,
        .playlist-row:active {
            background: var(--neon-blue);
            color: #111;
        }
        .playlist-row .num {
            width: 24px;
            opacity: 0.8;
        }
        .playlist-row a {
            color: inherit;
            text-decoration: none;
        }
        @keyframes blink {
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <!-- Swimming fish layer -->
    <div id="fish-layer"></div>
    <!-- Audio element -->
    <audio id="bg-audio" src="underwater.mp3" loop preload="auto"></audio>
    <!-- Tap-to-enter overlay -->
    <div id="start-overlay">
        <div class="enter-text">[ TAP TO ENTER ]</div>
        <div class="sub-text">tap anywhere to start</div>
    </div>
    <!-- Mute toggle -->
    <button id="mute-btn" title="toggle mute">[ MUTE ]</button>
    <div class="winamp" id="winamp">
        <div class="title-bar">
            <span>digi_xd / dawood / 23 x_x</span>
            <div class="title-buttons">
                <div class="title-btn">_</div>
                <div class="title-btn">□</div>
                <div class="title-btn" id="close-btn" title="close">×</div>
            </div>
        </div>
        <div class="main-window">
            <div class="now-playing-panel">
                <div class="visualizer" id="visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <div class="time-display" id="time-display">00:00</div>
            </div>
            <div class="track-info">
                <div class="artist"></div>
                <div class="track-title" id="track-title">april 19, 2026 – ongoing...</div>
            </div>
            <div class="controls">
                <div class="ctrl-btn" id="prev-btn">⏮︎</div>
                <div class="ctrl-btn" id="play-btn">▶︎</div>
                <div class="ctrl-btn" id="pause-btn">⏸︎</div>
                <div class="ctrl-btn" id="stop-btn">⏹︎</div>
                <div class="ctrl-btn" id="next-btn">⏭︎</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="footer-info">
                <div>◼ <span id="status">READY</span></div>
                <div></div>
                <div>BUFF: <span class="blink">100%</span></div>
            </div>
        </div>
        <div class="playlist">
            <div class="playlist-header">my socials</div>
            <div class="playlist-list">
                <div class="playlist-row" data-url="https://open.spotify.com/user/c9s76d0yv1dagb3vhdzmoe4ex">
                    <span class="num">01.</span>
                    <a href="https://open.spotify.com/user/c9s76d0yv1dagb3vhdzmoe4ex" target="_blank">spotify</a>
                </div>
                <div class="playlist-row">
                    <span class="num">02.</span>
                    <span>discord → digi_xd</span>
                </div>
                <div class="playlist-row" data-url="https://www.instagram.com/digi.xd/">
                    <span class="num">03.</span>
                    <a href="https://www.instagram.com/digi.xd/" target="_blank">insta</a>
                </div>
                <div class="playlist-row" data-url="https://www.youtube.com/@digi_xdd">
                    <span class="num">04.</span>
                    <a href="https://www.youtube.com/@digi_xdd" target="_blank">yt</a>
                </div>
                <div class="playlist-row" data-url="https://www.youtube.com/@digixd2">
                    <span class="num">05.</span>
                    <a href="https://www.youtube.com/@digixd2" target="_blank">yt2</a>
                </div>
                <div class="playlist-row" data-url="https://x.com/digii_priv">
                    <span class="num">06.</span>
                    <a href="https://x.com/digii_priv" target="_blank">twitter</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════════
        // FISH SWIMMING SYSTEM
        // ══════════════════════════════════════════════
        const FISH_FILES = [
            'fish_MrBanana.png',
            'fish_Rocky.png',
            'fish_ERM ACKSHULLY.png',
            'fish_oh my god fish.png',
            'fish_heart1.png',
              'fish_twinjamin.png',
              'fish_mrow.png',
              'fish_Josiah.png',
        'fish_FIH.png',
            'fish_ash.png',
            'fish_tray.png',
            'fish_nessie.png',
            'fish_bobby.png',
            
            
            
            
            
            
            
            'fish_Stockness Monster.png', // ← renamed for safety
            // Add more fish here
        ];

        const fishLayer = document.getElementById('fish-layer');
        const activeFish = [];

        function fishName(filename) {
            const base = filename.replace('.png', '');
            const parts = base.split('_');
            let name = parts.length > 1 ? parts.slice(1).join('_') : base;

            // Special case to show <3 instead of "heart"
            if (filename.includes('heart1')) {
                name = '<3';
            }

            return name;
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function isMobile() {
            return window.innerWidth <= 480;
        }

        function spawnFish(filename) {
            const name = fishName(filename);
            const wrapper = document.createElement('div');
            wrapper.className = 'swimming-fish';
            const img = document.createElement('img');
            img.src = filename;
            img.alt = name;
            img.draggable = false;
            const label = document.createElement('div');
            label.className = 'fish-label';
            label.textContent = name;
            wrapper.appendChild(img);
            wrapper.appendChild(label);
            fishLayer.appendChild(wrapper);

            const W = window.innerWidth;
            const H = window.innerHeight;
            const baseSize = isMobile() ? 55 : 96;
            const sizeRange = isMobile() ? 35 : 97;
            const size = baseSize + Math.random() * sizeRange;
            const duration = 12000 + Math.random() * 14000;
            const wobbleAmp = 18 + Math.random() * 28;
            const wobbleSpeed = 0.6 + Math.random() * 1.2;
            const tiltAmp = 6 + Math.random() * 10;
            const rollSpeed = 0.3 + Math.random() * 0.5;
            const rollAmp = 4 + Math.random() * 8;
            const edge = Math.floor(Math.random() * 2);
            let startX, startY, endX, endY;
            let facingLeft = false;

            if (edge === 0) {
                startX = -120; endX = W + 120;
                startY = 60 + Math.random() * (H - 160); endY = startY + (Math.random() - 0.5) * 120;
                facingLeft = false;
            } else {
                startX = W + 120; endX = -120;
                startY = 60 + Math.random() * (H - 160); endY = startY + (Math.random() - 0.5) * 120;
                facingLeft = true;
            }

            img.style.width = size + 'px';
            const dx = endX - startX;
            const dy = endY - startY;
            const travelAngleDeg = Math.atan2(dy, dx) * (180 / Math.PI);
            const baseAngle = facingLeft ? travelAngleDeg + 180 : travelAngleDeg;
            const scaleX = facingLeft ? -1 : 1;
            const startTime = performance.now();
            let raf;

            function tick(now) {
                const elapsed = now - startTime;
                const t = elapsed / duration;
                if (t >= 1) {
                    if (fishLayer.contains(wrapper)) fishLayer.removeChild(wrapper);
                    const idx = activeFish.indexOf(entry);
                    if (idx > -1) activeFish.splice(idx, 1);
                    setTimeout(() => spawnFish(filename), 1000 + Math.random() * 4000);
                    return;
                }
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                const x = startX + (endX - startX) * ease;
                const y = startY + (endY - startY) * ease;
                const wobble = Math.sin(elapsed / 1000 * wobbleSpeed * Math.PI * 2) * wobbleAmp;
                const tilt = Math.sin(elapsed / 1000 * wobbleSpeed * Math.PI * 2) * tiltAmp;
                const roll = Math.sin(elapsed / 1000 * rollSpeed * Math.PI * 2) * rollAmp;
                const perpAngle = Math.atan2(dy, dx) - Math.PI / 2;
                const wx = Math.cos(perpAngle) * wobble;
                const wy = Math.sin(perpAngle) * wobble;
                wrapper.style.left = (x + wx) + 'px';
                wrapper.style.top = (y + wy) + 'px';
                const finalAngle = baseAngle + tilt + roll;
                img.style.transform = `rotate(${finalAngle}deg) scaleX(${scaleX})`;
                raf = requestAnimationFrame(tick);
            }
            raf = requestAnimationFrame(tick);
            const entry = { wrapper, raf, filename };
            activeFish.push(entry);
        }

        const shuffledFish = shuffle(FISH_FILES);
        shuffledFish.forEach((file, i) => {
            setTimeout(() => spawnFish(file), i * 100 + Math.random() * 100);
        });

        // ══════════════════════════════════════════════
        // AUDIO SETUP
        // ══════════════════════════════════════════════
        const audio = document.getElementById('bg-audio');
        const overlay = document.getElementById('start-overlay');
        const muteBtn = document.getElementById('mute-btn');
        audio.volume = 0.5;

        function startAudio() {
            overlay.classList.add('hidden');
            muteBtn.style.display = 'block';
            audio.play().catch(err => console.warn('Audio play failed:', err));
        }

        overlay.addEventListener('click', startAudio, { once: true });
        overlay.addEventListener('touchend', startAudio, { once: true, passive: true });

        muteBtn.addEventListener('click', () => {
            audio.muted = !audio.muted;
            muteBtn.textContent = audio.muted ? '[ UNMUTE ]' : '[ MUTE ]';
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && audio.paused && !audio.muted) {
                audio.play().catch(() => {});
            }
        });

        // ══════════════════════════════════════════════
        // WINAMP UI LOGIC
        // ══════════════════════════════════════════════
        let seconds = 0;
        let progress = 0;
        let isPlaying = true;
        let timeInterval, progressInterval, eqInterval;
        const timeDisplay = document.getElementById('time-display');
        const progressBar = document.getElementById('progress-bar');
        const statusEl = document.getElementById('status');
        const bars = document.querySelectorAll('.bar');
        const closeBtn = document.getElementById('close-btn');

        function animateEqualizer() {
            bars.forEach(bar => {
                const height = 20 + Math.random() * 78;
                bar.style.height = `${height}%`;
            });
        }

        function updateTime() {
            if (!isPlaying) return;
            seconds++;
            const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
            const ss = String(seconds % 60).padStart(2, '0');
            timeDisplay.textContent = `${mm}:${ss}`;
        }

        function updateProgress() {
            if (!isPlaying) return;
            progress = (progress + 3.5) % 101;
            progressBar.style.width = `${progress}%`;
        }

        function startAnimations() {
            if (timeInterval) clearInterval(timeInterval);
            if (progressInterval) clearInterval(progressInterval);
            if (eqInterval) clearInterval(eqInterval);
            timeInterval = setInterval(updateTime, 1000);
            progressInterval = setInterval(updateProgress, 90);
            eqInterval = setInterval(animateEqualizer, 38);
        }

        closeBtn.addEventListener('click', () => {
            setTimeout(() => { alert("loser :P"); }, 100);
        });

        document.getElementById('play-btn').addEventListener('click', () => {
            isPlaying = true;
            statusEl.textContent = 'PLAYING';
        });

        document.getElementById('pause-btn').addEventListener('click', () => {
            isPlaying = false;
            statusEl.textContent = 'PAUSED';
        });

        document.getElementById('stop-btn').addEventListener('click', () => {
            isPlaying = false;
            seconds = 0;
            progress = 0;
            timeDisplay.textContent = '00:00';
            progressBar.style.width = '0%';
            statusEl.textContent = 'STOPPED';
        });

        document.querySelectorAll('.playlist-row').forEach(row => {
            row.addEventListener('click', () => {
                const link = row.querySelector('a');
                if (link) window.open(link.href, '_blank');
            });
        });

        document.addEventListener('keydown', e => {
            if (e.key === ' ') {
                e.preventDefault();
                isPlaying = !isPlaying;
                statusEl.textContent = isPlaying ? 'PLAYING' : 'PAUSED';
            }
        });

        window.onload = () => { startAnimations(); };
    </script>
</body>
</html>
